server.port=8080



# MySQL Configuration (Local)
spring.datasource.url=jdbc:mysql://localhost:3306/fencepro?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=fencepro_user
spring.datasource.password=fencepro_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Security
app.security.jwt.secret=12345678901234567890123456789012
app.security.jwt.expirationMinutes=60

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.fencepro.backend=DEBUG

# API Base Path
spring.mvc.servlet.path=/api

# ============================================
# PERFIL DE DESARROLLO (sin encriptación)
# ============================================
spring.profiles.active=dev


