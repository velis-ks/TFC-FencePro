# ============================================
# FencePro Backend - Configuration
# ============================================
# Configuración con variables de entorno
# Compatible con desarrollo local y AWS RDS

# Server
server.port=8080

# Database Configuration
# Usa variables de entorno o valores por defecto (local)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/fencepro?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Connection Pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JWT Security
app.security.jwt.secret=${JWT_SECRET:12345678901234567890123456789012}
app.security.jwt.expirationMinutes=${JWT_EXPIRATION:60}

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.fencepro=DEBUG
