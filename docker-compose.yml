services:
  db:
    image: mysql:8.0
    container_name: fencepro-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fencepro
      MYSQL_USER: fencepro_user
      MYSQL_PASSWORD: fencepro_password_2024
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fencepro-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fencepro-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/fencepro?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: fencepro_user
      SPRING_DATASOURCE_PASSWORD: fencepro_password_2024
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fencepro-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fencepro-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - fencepro-network

networks:
  fencepro-network:
    driver: bridge

volumes:
  mysql_data:
