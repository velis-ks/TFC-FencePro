version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: fencepro-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: fencepro
      MYSQL_USER: fencepro_user
      MYSQL_PASSWORD: fencepro_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - fencepro-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fencepro-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/fencepro?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: fencepro_user
      SPRING_DATASOURCE_PASSWORD: fencepro_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
    ports:
      - "8080:8080"
    networks:
      - fencepro-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fencepro-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - fencepro-network

volumes:
  mysql_data:

networks:
  fencepro-network:
    driver: bridge
